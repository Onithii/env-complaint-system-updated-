<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Haritha Complaint System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <h1>Submit Complaint</h1>

    <form id="complaintForm">
        <input type="text" id="complaintType" placeholder="Complaint Type" required>

        <textarea id="description" placeholder="Description" required></textarea>

        <input type="number" id="latitude" placeholder="Latitude" step="any" required>

        <input type="number" id="longitude" placeholder="Longitude" step="any" required>

        <button type="submit">Submit</button>
    </form>

    <p id="message"></p>
</div>

<script src="js/script.js"></script>
</body>
</html>
